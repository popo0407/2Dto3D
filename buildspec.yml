version: 0.2

# CadQuery コンテナイメージを ECR へビルド・プッシュする
# 使用方法:
#   AWS コンソール / CLI で CodeBuild プロジェクトを作成し、
#   このファイルをビルドスペックとして指定する。
# 前提:
#   CodeBuild サービスロールに以下の権限が必要
#     - ecr:GetAuthorizationToken           (Resource: *)
#     - ecr:BatchCheckLayerAvailability
#     - ecr:GetDownloadUrlForLayer
#     - ecr:BatchGetImage
#     - ecr:PutImage
#     - ecr:InitiateLayerUpload
#     - ecr:UploadLayerPart
#     - ecr:CompleteLayerUpload
#       (Resource: arn:aws:ecr:<region>:<account>:repository/2dto3d-<env>-cadquery)
#     - logs:CreateLogGroup / CreateLogStream / PutLogEvents
#       (Resource: arn:aws:logs:<region>:<account>:log-group:/aws/codebuild/*)

env:
  variables:
    AWS_DEFAULT_REGION: "ap-northeast-1"
    AWS_ACCOUNT_ID: "590184009554"
    ENV_NAME: "dev"           # CodeBuild 環境変数 or オーバーライドで prod に変更可

phases:
  pre_build:
    commands:
      - echo "Logging in to Amazon ECR..."
      - REPOSITORY_URI=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_DEFAULT_REGION}.amazonaws.com/2dto3d-${ENV_NAME}-cadquery
      - aws ecr get-login-password --region ${AWS_DEFAULT_REGION} | docker login --username AWS --password-stdin ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_DEFAULT_REGION}.amazonaws.com
      - COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
      - IMAGE_TAG=${COMMIT_HASH:=latest}

  build:
    commands:
      - echo "Building the Docker image on $(date)"
      - docker build -t ${REPOSITORY_URI}:${IMAGE_TAG} backend/functions/cadquery_runner/
      - docker tag ${REPOSITORY_URI}:${IMAGE_TAG} ${REPOSITORY_URI}:latest

  post_build:
    commands:
      - echo "Pushing the Docker images on $(date)"
      - docker push ${REPOSITORY_URI}:${IMAGE_TAG}
      - docker push ${REPOSITORY_URI}:latest
      - echo "Writing image definitions file..."
      - printf '[{"name":"cadquery-runner","imageUri":"%s"}]' ${REPOSITORY_URI}:${IMAGE_TAG} > imagedefinitions.json
      - echo "Build completed successfully"

artifacts:
  files: imagedefinitions.json
